<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
    <defs>
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0d0d1a"/>
            <stop offset="100%" stop-color="#141428"/>
        </linearGradient>
        <radialGradient id="topGlow" cx="50%" cy="0%" r="60%">
            <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
            <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#d946ef"/>
            <stop offset="50%" stop-color="#8b5cf6"/>
            <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
        <linearGradient id="logoGrad" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="#d946ef"/>
            <stop offset="50%" stop-color="#8b5cf6"/>
            <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
    </defs>

    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bgGrad)"/>
    <rect width="1200" height="630" fill="url(#topGlow)"/>

    <!-- Accent stripe top -->
    <rect x="0" y="0" width="1200" height="4" fill="url(#brandGrad)"/>

    <!-- Logo top-left -->
    <g transform="translate(80, 80)">
        <circle cx="32" cy="32" r="30" fill="url(#logoGrad)"/>
        <path d="M 22 26 L 22 37 Q 22 43 29 43 L 35 43 Q 42 43 42 37 L 42 24" stroke="#ffffff" stroke-width="4" stroke-linecap="round" fill="none"/>
        <path d="M 34 25 L 42 16 L 50 25 Z" fill="#ffffff"/>

        <text x="80" y="40" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="36" font-weight="800" letter-spacing="-1" fill="#ffffff">Up<tspan fill="url(#brandGrad)">Scale</tspan></text>
    </g>

    <!-- Pill tag -->
    <g transform="translate(80, 220)">
        <rect x="0" y="0" rx="22" width="320" height="44" fill="#d946ef" fill-opacity="0.12" stroke="#d946ef" stroke-opacity="0.3"/>
        <text x="22" y="29" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="2" fill="#d946ef">DONE-FOR-YOU LEAD GENERATION</text>
    </g>

    <!-- Main headline -->
    <text x="80" y="340" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="68" font-weight="900" fill="#ffffff" letter-spacing="-2">Exclusive leads.</text>
    <text x="80" y="420" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="68" font-weight="900" fill="url(#brandGrad)" letter-spacing="-2">Delivered daily.</text>

    <!-- Sub-headline -->
    <text x="80" y="490" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="26" font-weight="500" fill="#94a3b8">B2C ads · B2B cold outreach · Built in the UK</text>

    <!-- URL bottom-left -->
    <text x="80" y="570" font-family="-apple-system, BlinkMacSystemFont, Helvetica, Arial, sans-serif" font-size="22" font-weight="600" fill="#e2e8f0">upscaleleadmarketing.co.uk</text>

    <!-- Decorative gradient accent bottom right -->
    <circle cx="1100" cy="540" r="80" fill="url(#brandGrad)" opacity="0.15"/>
    <circle cx="1080" cy="510" r="50" fill="url(#brandGrad)" opacity="0.25"/>
    <circle cx="1060" cy="490" r="28" fill="url(#brandGrad)" opacity="0.4"/>
</svg>
